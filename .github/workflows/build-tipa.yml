name: Build Star.tipa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos manually
        run: |
          export THEOS=$HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

          brew update || true
          brew install ldid xz || true

          git clone --recursive https://github.com/theos/theos.git "$THEOS"

          mkdir -p "$THEOS/sdks"
          curl -L --retry 5 --retry-delay 5 \
            -o /tmp/iPhoneOS16.5.sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz

          tar -xJf /tmp/iPhoneOS16.5.sdk.tar.xz -C "$THEOS/sdks"

          ls -la "$THEOS/sdks"

      - name: Build
        working-directory: DeltaForce_TrollKit
        run: |
          export THEOS=$HOME/theos
          make clean
          make package

      - name: Show output files
        working-directory: DeltaForce_TrollKit
        run: |
          find . -type f \( -name "*.tipa" -o -name "*.ipa" -o -name "*.deb" \) -print

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: Star.tipa
          path: |
            DeltaForce_TrollKit/**/*.tipa
            DeltaForce_TrollKit/**/*.ipa
            DeltaForce_TrollKit/**/*.deb
          if-no-files-found: warn
