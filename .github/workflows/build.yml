name: Build Star.tipa

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos and SDK
        run: |
          export THEOS=/opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

          sudo rm -rf /opt/theos
          sudo mkdir -p /opt/theos
          sudo chown -R $(whoami) /opt/theos

          git clone --recursive --depth=1 https://github.com/theos/theos.git /opt/theos

          brew install ldid xz || true

          mkdir -p /opt/theos/sdks
          curl -L --retry 5 --retry-delay 5 \
            -o /tmp/iPhoneOS16.5.sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz

          tar -xJf /tmp/iPhoneOS16.5.sdk.tar.xz -C /opt/theos/sdks

          echo "Installed SDKs:"
          ls -la /opt/theos/sdks

      - name: Build
        working-directory: DeltaForce_TrollKit
        run: |
          export THEOS=/opt/theos
          make clean
          make package FINAL_PACKAGE=1

      - name: Show output files
        working-directory: DeltaForce_TrollKit
        run: |
          echo "All package files:"
          find . -type f \( -name "*.tipa" -o -name "*.ipa" -o -name "*.deb" \) -print

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Star-package
          path: |
            DeltaForce_TrollKit/**/*.tipa
            DeltaForce_TrollKit/**/*.ipa
            DeltaForce_TrollKit/**/*.deb
          if-no-files-found: error
