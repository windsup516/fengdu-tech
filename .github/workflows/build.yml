name: Build Stocks.tipa

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      THEOS: /opt/theos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install ldid xz || true

      - name: Install Theos
        run: |
          sudo rm -rf /opt/theos
          sudo mkdir -p /opt/theos
          sudo chown -R $(whoami) /opt/theos

          git clone --recursive --depth=1 https://github.com/theos/theos.git /opt/theos

          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          ls -la /opt/theos

      - name: Download iOS SDK
        run: |
          mkdir -p /opt/theos/sdks

          SDK_URL="https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"

          echo "Downloading SDK from: $SDK_URL"
          curl -L --retry 5 --retry-delay 5 -o /tmp/iPhoneOS.sdk.tar.xz "$SDK_URL"

          echo "Extracting SDK..."
          tar -xJf /tmp/iPhoneOS.sdk.tar.xz -C /opt/theos/sdks/

          echo "SDK installed:"
          ls -la /opt/theos/sdks/

      - name: Build Stocks.app
        working-directory: DeltaForce_TrollKit
        run: |
          export THEOS=/opt/theos
          make clean || true
          make package FINAL_PACKAGE=1

      - name: Show output files
        working-directory: DeltaForce_TrollKit
        run: |
          echo "Searching package outputs..."
          find . -type f \( -name "*.tipa" -o -name "*.ipa" -o -name "*.deb" \) -print

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stocks-package-${{ github.sha }}
          path: |
            DeltaForce_TrollKit/**/*.tipa
            DeltaForce_TrollKit/**/*.ipa
            DeltaForce_TrollKit/**/*.deb
          if-no-files-found: error
