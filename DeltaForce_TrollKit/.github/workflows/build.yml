# Stocks.app — GitHub Actions 自动编译
# 基于 Theos (iOS 越狱应用构建系统)
# 输出: Stocks.tipa (TrollStore 安装包)

name: Build Stocks.tipa

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      # 步骤1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤2: 安装 Theos
      - name: Install Theos
        run: |
          sudo mkdir -p /opt/theos
          sudo chown $(whoami) /opt/theos
          git clone --recursive --depth=1 \
            https://github.com/theos/theos.git /opt/theos

      # 步骤3: 下载 iOS SDK
      - name: Download iOS SDK
        run: |
          mkdir -p /opt/theos/sdks
          SDK_URL="https://github.com/theos/sdks/releases/latest/download/iPhoneOS17.0.sdk.tar.xz"
          echo "Downloading SDK from: $SDK_URL"
          curl -L -o /tmp/sdk.tar.xz "$SDK_URL"
          echo "Extracting SDK..."
          tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks/
          echo "SDK installed:"
          ls -la /opt/theos/sdks/

      # 步骤4: 缓存 Theos
      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: |
            /opt/theos
          key: ${{ runner.os }}-theos-full

      # 步骤5: 构建
      - name: Build Stocks.app
        run: |
          cd DeltaForce_TrollKit
          export THEOS=/opt/theos
          make package FINAL_PACKAGE=1

      # 步骤6: 上传 .tipa
      - name: Upload .tipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stocks-${{ github.sha }}
          path: DeltaForce_TrollKit/*.tipa
          if-no-files-found: error

      # 步骤7: 上传 .deb
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: Stocks-deb-${{ github.sha }}
          path: DeltaForce_TrollKit/*.deb
          if-no-files-found: ignore
